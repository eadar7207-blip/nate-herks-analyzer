name: Daily Nate Herks Analysis

on:
  schedule:
    # Runs every day at 8:00 AM UTC (3:00 AM EST / 12:00 AM PST)
    # You can adjust the time by changing the cron expression
    - cron: '0 8 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Restore processed videos cache
        uses: actions/download-artifact@v4
        with:
          name: processed-videos-cache
          path: .
        continue-on-error: true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run video analyzer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python analyzer.py

      - name: Commit analysis to repo
        run: |
          git config user.name "nate-herks-analyzer[bot]"
          git config user.email "nate-herks-analyzer[bot]@users.noreply.github.com"
          git add latest_analysis.md
          git diff --cached --quiet || git commit -m "chore: update latest analysis [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processed-videos-cache
          path: .processed_videos.json
          retention-days: 90
