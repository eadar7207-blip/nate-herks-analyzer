name: Daily Nate Herks Analysis

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['analyzer.py', 'requirements.txt']

concurrency:
  group: analyze
  cancel-in-progress: false  # Let the running job finish; queue the next one

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Restore processed videos cache
        uses: actions/download-artifact@v4
        with:
          name: processed-videos-cache
          path: .
        continue-on-error: true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run video analyzer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: python analyzer.py

      - name: Commit analysis to repo
        run: |
          git config user.name "nate-herks-analyzer[bot]"
          git config user.email "nate-herks-analyzer[bot]@users.noreply.github.com"
          git add latest_analysis.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new analysis to commit"
          else
            git commit -m "chore: update latest analysis [skip ci]"
            for attempt in 1 2 3; do
              git push && break
              echo "Push attempt $attempt failed, rebasing and retrying..."
              git pull --rebase origin main
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processed-videos-cache
          path: .processed_videos.json
          if-no-files-found: ignore
          retention-days: 365
