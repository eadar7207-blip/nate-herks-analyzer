name: Daily Nate Herks Analysis

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['analyzer.py', 'requirements.txt']

concurrency:
  group: analyze
  cancel-in-progress: false  # Let the running job finish; queue the next one

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Restore processed videos cache from artifact (supplements repo copy)
        uses: actions/download-artifact@v4
        with:
          name: processed-videos-cache
          path: .
        continue-on-error: true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # yt-dlp may already be system-installed; ensure latest pip version wins
          pip install -q --upgrade yt-dlp

      - name: Probe RSS feed
        run: |
          echo "=== RSS probe ===" > /tmp/rss_probe.txt
          curl -s -L --max-time 15 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -o /tmp/rss_body.txt \
            -w "HTTP %{http_code} size=%{size_download}" \
            "https://www.youtube.com/feeds/videos.xml?channel_id=UC2ojq-nuP8ceeHqiroeKhBA" \
            >> /tmp/rss_probe.txt 2>&1 || echo "curl error $?" >> /tmp/rss_probe.txt
          echo "" >> /tmp/rss_probe.txt
          head -c 400 /tmp/rss_body.txt >> /tmp/rss_probe.txt 2>/dev/null || true
          cat /tmp/rss_probe.txt

      - name: Run video analyzer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python analyzer.py 2>&1 | tee /tmp/analyzer_output.txt

      - name: Commit analysis to repo
        run: |
          git config user.name "nate-herks-analyzer[bot]"
          git config user.email "nate-herks-analyzer[bot]@users.noreply.github.com"
          # Always commit diagnostics so we can read them
          {
            echo "# Run $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo '```'
            cat /tmp/rss_probe.txt 2>/dev/null || echo "(no probe output)"
            echo ""
            echo "--- analyzer output ---"
            cat /tmp/analyzer_output.txt 2>/dev/null || echo "(no analyzer output)"
            echo '```'
          } > diagnostic.txt
          # Commit processed-videos cache to repo so it survives artifact expiry
          git add diagnostic.txt latest_analysis.md .processed_videos.json 2>/dev/null || git add diagnostic.txt
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: update analysis + diagnostics [skip ci]"
            for attempt in 1 2 3; do
              git push && break
              echo "Push attempt $attempt failed, rebasing..."
              git pull --rebase origin main
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send analysis email (if new content)
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: |
          # Send email when latest_analysis.md was updated this run OR
          # when it hasn't been emailed yet (sha mismatch with .last_emailed_sha).
          CURRENT_SHA=$(git log -1 --format="%H" -- latest_analysis.md 2>/dev/null || echo "")
          LAST_SHA=$(cat .last_emailed_sha 2>/dev/null || echo "")
          if [ -n "$CURRENT_SHA" ] && [ "$CURRENT_SHA" != "$LAST_SHA" ]; then
            echo "New analysis detected (sha $CURRENT_SHA vs last $LAST_SHA) — sending email"
            python send_analysis_email.py && echo "$CURRENT_SHA" > .last_emailed_sha
          else
            echo "Analysis unchanged since last email — skipping"
          fi

      - name: Commit email-sent marker
        run: |
          git config user.name "nate-herks-analyzer[bot]"
          git config user.email "nate-herks-analyzer[bot]@users.noreply.github.com"
          if [ -f .last_emailed_sha ]; then
            git add .last_emailed_sha
            if git diff --cached --quiet; then
              echo "Nothing to commit"
            else
              git commit -m "chore: update email-sent marker [skip ci]"
              for attempt in 1 2 3; do
                git push && break
                echo "Push attempt $attempt failed, rebasing..."
                git pull --rebase origin main
              done
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processed-videos-cache
          path: .processed_videos.json
          if-no-files-found: ignore
          retention-days: 365
          overwrite: true
